; LANoMAT v2 — production PHP overrides for the FrankenPHP image.
;
; Raises the upload limits so large binaries can be uploaded through the admin
; panel: voice-client installers (Mumble/TeamSpeak client bundles, uploaded via
; the Voice module's VoiceClientInstaller resource) and the M7 file-sharing
; feature both legitimately exceed PHP's stock 2 MB / 8 MB defaults.
;
; Kept in sync with the application-level caps that sit ON TOP of these:
;   - config/livewire.php  -> temporary_file_upload.rules "max:1048576" (1 GB)
;   - each Filament FileUpload ->maxSize(1048576)
; The application caps must always stay <= these PHP limits, or Livewire rejects
; the temp upload before the app-level rule ever runs.
;
; memory_limit is deliberately left modest: PHP streams multipart uploads to
; temporary files on disk (upload_tmp_dir) rather than buffering the whole
; request body in memory, so 512M comfortably covers a 1 GB upload.
upload_max_filesize = 1G
post_max_size = 1G
memory_limit = 512M
