name: lanomat

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lanomat
      POSTGRES_PASSWORD: lanomat
      POSTGRES_DB: lanomat
    # host port 5434: defaults 5432/5433 are taken for other local containers
    ports: ['5434:5432']
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init-test-db.sql:/docker-entrypoint-initdb.d/init-test-db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U lanomat']
      interval: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    # host port 6380: default 6379 is taken by another local container
    ports: ['6380:6379']

  # Dev-only Reverb (websocket) server. This reuses the official PHP CLI
  # image against the working tree — same approach `composer run dev` uses
  # to run the app natively today. The base image lacks the
  # pgsql/redis/sodium extensions the app normally runs with (see
  # .github/workflows/ci.yml); `reverb:start` itself only needs the app
  # booted plus Redis (for `REVERB_SCALING_ENABLED`, off by default), but if
  # you hit missing-extension errors, run `composer run dev`'s reverb process
  # on the host instead. Production uses the `reverb-prod` service below
  # (the real FrankenPHP `app` image, `docker/Dockerfile`) instead of this
  # throwaway one.
  #
  # `profiles: ["", "dev"]` — Compose has no built-in "only when no
  # --profile flag given" marker (a service with no `profiles` key at all is
  # *always* active, under every profile too), but the empty string `""` is
  # the documented profile that is implicitly active whenever no `--profile`
  # flag is passed. Listing `""` alongside `dev` keeps
  # `docker compose up -d` (no flags) exactly as before, while excluding
  # this throwaway service from `docker compose --profile prod up` (which
  # brings up `reverb-prod` instead). Unlike postgres/redis/mumble/
  # mumble-admin above (genuinely shared, always-on infra for both dev and
  # prod), this service must NOT run at the same time as `reverb-prod` —
  # both would fight over host port 8081.
  reverb:
    image: php:8.4-cli
    profiles: ['', 'dev']
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    env_file: .env
    # host port 8081: default 8080 is commonly taken by other local dev
    # servers, mirroring the postgres/redis non-default-port convention above
    ports: ['8081:8080']
    depends_on: [redis]

  # --- Production (M5 Task 14): `docker compose --profile prod up -d` ---
  # These four services share the FrankenPHP `app` image (docker/Dockerfile)
  # built once and reused across roles, exactly like `composer run dev` runs
  # app/queue/vite as separate processes against the same codebase in dev.
  # `postgres`/`redis`/`mumble`/`mumble-admin` above have no `profiles` key,
  # so they are shared infrastructure: already running for both `up -d`
  # (dev) and `--profile prod up` (prod) without being duplicated here.

  # Traefik v3 ingress (M7 Task 8 / roadmap 7.1, GitHub #7): TLS-terminating
  # reverse proxy in front of `app` (participant UI + Filament `/admin`,
  # same service, path-routed — no split) and `reverb-prod` (WebSockets).
  # Only active under `--profile prod`; the dev stack (`docker compose up
  # -d`, no profile) never runs this and is unaffected. See
  # docker/traefik/traefik.yml + dynamic.yml and docs/traefik-setup.md.
  traefik:
    image: traefik:v3.5
    profiles: [prod]
    command:
      # ACME account email is the one static-config value that can't live
      # in traefik.yml itself (Traefik's config *file* has no ${VAR}
      # interpolation) — passed as a CLI flag here instead, where
      # `${ACME_EMAIL}` is Compose's own substitution from `.env`.
      - '--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL}'
    env_file: .env
    ports:
      - '80:80'
      - '443:443'
      # Dashboard/API: LAN-only, never publicly published (see
      # traefik.yml's `api.insecure` comment).
      - '127.0.0.1:8090:8080'
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_acme:/letsencrypt

  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    profiles: [prod]
    env_file: .env
    ports: ['8000:80']
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost/up']
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    # Traefik routes both the participant app and Filament `/admin` here —
    # `/admin` is just a path on this same FrankenPHP service, so one
    # router covers both (no separate admin router). TLS: `tls.certresolver`
    # requests a Let's Encrypt cert for `APP_DOMAIN`; on a pure-LAN
    # deployment with no public DNS, drop that one label (or leave
    # APP_DOMAIN unset — the rule then never matches a real request, see
    # docs/traefik-setup.md's self-signed-fallback section) and Traefik's
    # `websecure` entrypoint falls back to its self-signed default
    # certificate.
    labels:
      traefik.enable: 'true'
      traefik.http.routers.app.rule: 'Host(`${APP_DOMAIN}`)'
      traefik.http.routers.app.entrypoints: 'websecure'
      traefik.http.routers.app.tls: 'true'
      traefik.http.routers.app.tls.certresolver: 'letsencrypt'
      traefik.http.routers.app.middlewares: 'secure-headers@file'
      traefik.http.services.app.loadbalancer.server.port: '80'

  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
    profiles: [prod]
    command: php artisan queue:work --tries=3 --max-time=3600
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # Laravel's own cron-replacement process: re-checks routes/console.php's
  # Schedule::command(...) entries every minute for as long as it runs (the
  # four M2/M3 commands plus M5's `lanomat:send-schedule-reminders`) — the
  # containerized equivalent of the README's dev instruction to run
  # `php artisan schedule:work` in a separate terminal.
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
    profiles: [prod]
    command: php artisan schedule:work
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # Production Reverb: the real `app` image (not the throwaway `php:8.4-cli`
  # the dev `reverb` service above uses), so it has the pgsql/redis/sodium/
  # intl/zip extensions and the optimized autoloader/caches. Bound to the
  # same non-default host port 8081 the dev service uses, for parity with
  # REVERB_PORT in .env.example (only one of `reverb`/`reverb-prod` is ever
  # running at a time — dev xor prod).
  reverb-prod:
    build:
      context: .
      dockerfile: docker/Dockerfile
    profiles: [prod]
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    env_file: .env
    ports: ['8081:8080']
    depends_on:
      redis:
        condition: service_started
    # Own router on a `ws.` subdomain (see docs/traefik-setup.md for why a
    # subdomain was chosen over a shared path: Reverb's own HTTP surface
    # only understands its websocket/broadcast routes, so it can't sit
    # behind a path prefix on the same Host rule as `app` without extra
    # stripprefix rewriting). WebSocket upgrade needs no special Traefik
    # middleware — v3 detects and forwards the Upgrade/Connection headers
    # automatically for any plain HTTP router (verified via context7); this
    # is just a normal router + service pointing at Reverb's HTTP port.
    labels:
      traefik.enable: 'true'
      traefik.http.routers.reverb.rule: 'Host(`ws.${APP_DOMAIN}`)'
      traefik.http.routers.reverb.entrypoints: 'websecure'
      traefik.http.routers.reverb.tls: 'true'
      traefik.http.routers.reverb.tls.certresolver: 'letsencrypt'
      traefik.http.services.reverb.loadbalancer.server.port: '8080'

  # Mumble voice server (M3, Modul 12). Official image, pinned to the
  # v1.4.x stable line (matches docker/mumble-admin/Murmur.ice's Ice slice).
  # Ice is baked into this image (libzeroc-ice3.7t64) but disabled by
  # default; MUMBLE_CONFIG_ICE enables it, bound to 0.0.0.0 so the
  # mumble-admin sidecar (a separate container) can reach it over the
  # compose network. icesecretwrite gates all Ice write calls.
  mumble:
    image: mumblevoip/mumble-server:v1.4.230
    environment:
      MUMBLE_CONFIG_ICE: 'tcp -h 0.0.0.0 -p 6502'
      MUMBLE_CONFIG_ICESECRETWRITE: ${MUMBLE_ICE_SECRET}
      MUMBLE_CONFIG_SERVERPASSWORD: ${MUMBLE_SERVER_PASSWORD}
      MUMBLE_SUPERUSER_PASSWORD: ${MUMBLE_ICE_SECRET}
    # host ports 64738 (TCP+UDP): Mumble's own default, no local collision
    # observed; kept as-is. The Ice port (6502) is intentionally NOT
    # published to the host — only mumble-admin (same compose network)
    # needs it.
    ports: ['64738:64738', '64738:64738/udp']
    volumes:
      - mumble_data:/data

  # Ice-REST sidecar (M3, Modul 12): translates the Mumble Ice interface
  # into the small REST surface `MumbleClient` (Task 20) needs. murmur-rest
  # (github.com/alfg/murmur-rest) was evaluated and rejected — no real
  # commit since 2024-07, Flask + an unpinned old Ice binding, not
  # republished for any current Mumble/Ice pairing — so this is a minimal
  # own FastAPI sidecar (docker/mumble-admin/), deliberately small and
  # entirely encapsulated behind the `MumbleClient` interface (never called
  # directly from tests; see docker/mumble-admin/app.py's module docstring).
  mumble-admin:
    build: ./docker/mumble-admin
    environment:
      MUMBLE_ICE_HOST: mumble
      MUMBLE_ICE_PORT: '6502'
      MUMBLE_ICE_SECRET: ${MUMBLE_ICE_SECRET}
    # Host port 8085, bound to loopback only (127.0.0.1): non-default,
    # mirrors the postgres/redis/reverb convention above, but this
    # bearer-token-protected sidecar must never be reachable from outside
    # the host at all (dev or prod) — the Laravel app always talks to it
    # over the compose network at http://mumble-admin:8000, never via this
    # port. Binding to 127.0.0.1 keeps host-side debugging (`curl
    # localhost:8085/...`) working in dev while satisfying the M5 prod
    # requirement that this port is never publicly exposed, without having
    # to duplicate the service definition per compose profile.
    ports: ['127.0.0.1:8085:8000']
    depends_on: [mumble]

  # TeamSpeak voice server (M8, Modul Voice-Multiprovider). Official image;
  # unlike `mumble`/`mumble-admin` above (always-on shared infra since M3),
  # this pair is `profiles: [prod]`-only for now — mode A this phase (see
  # docs/teamspeak-setup.md): config + docs, not yet real-verified against a
  # running server, so it stays out of the default dev `docker compose up
  # -d` until that verification happens.
  teamspeak:
    image: teamspeak:latest
    profiles: [prod]
    environment:
      TS3SERVER_LICENSE: accept
      TS3SERVER_QUERY_PROTOCOLS: raw
    # Voice port 9989 (UDP) and file-transfer 30033 (TCP) use TeamSpeak's own
    # defaults, no local collision observed. ServerQuery (10011) is
    # intentionally NOT published to the host — only teamspeak-admin (same
    # compose network) needs it, mirroring mumble's Ice-port convention above.
    ports: ['9989:9987/udp', '30033:30033']
    volumes:
      - teamspeak_data:/var/ts3server

  # ServerQuery-REST sidecar (M8 Task 8.3): translates the TeamSpeak
  # ServerQuery interface into the small REST surface `HttpTeamSpeakClient`
  # needs — identical contract to mumble-admin. Deliberately dependency-free
  # on the PHP side (`planetteamspeak/ts3-php-framework` caps at PHP 8.3, this
  # project is on 8.4) and its own minimal FastAPI sidecar rather than an
  # uncertain third-party ServerQuery wrapper on the Python side either; see
  # docker/teamspeak-admin/README.md.
  teamspeak-admin:
    build: ./docker/teamspeak-admin
    profiles: [prod]
    environment:
      TEAMSPEAK_HOST: teamspeak
      TEAMSPEAK_QUERY_PORT: '10011'
      TEAMSPEAK_QUERY_USER: serveradmin
      TEAMSPEAK_QUERY_PASSWORD: ${TEAMSPEAK_QUERY_PASSWORD}
      TEAMSPEAK_ADMIN_TOKEN: ${TEAMSPEAK_ADMIN_TOKEN}
    # Host port 8086, bound to loopback only (127.0.0.1): non-default
    # (mirrors mumble-admin's 8085 convention above), and this
    # bearer-token-protected sidecar must never be reachable from outside the
    # host — the Laravel app always talks to it over the compose network at
    # http://teamspeak-admin:8000, never via this port.
    ports: ['127.0.0.1:8086:8000']
    depends_on: [teamspeak]

  # Music Assistant (M11, Jukebox/LAN-Radio). Official image; like
  # `teamspeak`/`teamspeak-admin` above, this is `profiles: [prod]`-only for
  # now — mode A this phase (see docs/music-assistant-setup.md): contract +
  # HttpMusicClient + config/docs, not yet real-verified against a running
  # server, so it stays out of the default dev `docker compose up -d` until
  # that verification happens. `HttpMusicClient` talks to MA's HTTP/JSON-RPC
  # API directly (`http://<host-ip>:8095`, config('services.music_assistant.
  # base_url')) with a bearer token — no sidecar needed for commanding it,
  # unlike Mumble/TeamSpeak's Ice/ServerQuery sidecars.
  #
  # `network_mode: host` (not the shared compose network like every other
  # service here) per Music Assistant's own docs: it needs this for local
  # player discovery (mDNS/uPnP, e.g. Snapcast/Chromecast/AirPlay) and for
  # streaming to those devices on the LAN — bridge networking is documented
  # as unsupported for networked players. This means port 8095 is reachable
  # on the host's own network interface, not published via `ports:` (which
  # compose ignores under host networking anyway) — restrict host-firewall
  # access to 8095/8097 to the LAN, since host networking bypasses the
  # loopback-only pattern mumble-admin/teamspeak-admin use above.
  music-assistant:
    image: ghcr.io/music-assistant/server:latest
    profiles: [prod]
    network_mode: host
    volumes:
      - music_assistant_data:/data

volumes:
  pgdata:
  mumble_data:
  teamspeak_data:
  music_assistant_data:
  traefik_acme:
