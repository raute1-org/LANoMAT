name: CI
on:
  push: { branches: [main] }
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: lanomat, POSTGRES_PASSWORD: lanomat, POSTGRES_DB: lanomat_test }
        ports: ['5434:5432']
        options: >-
          --health-cmd "pg_isready -U lanomat" --health-interval 5s --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.4', extensions: 'pgsql, redis, sodium' }

      - uses: actions/setup-node@v6.4.0
        with: { node-version: 22, cache: npm }

      - name: Cache composer dependencies
        uses: actions/cache@v6
        with:
          path: ~/.composer/cache
          key: composer-${{ runner.os }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ runner.os }}-

      - run: composer install --no-interaction --prefer-dist
      - run: npm ci

      - run: cp .env.testing .env && php artisan key:generate

      # The Vite plugin shells out to this at buildStart; run it explicitly so
      # resources/js/{routes,actions,wayfinder} exist before type-checking/build.
      - run: php artisan wayfinder:generate --with-form

      - run: npm run build
      - run: ./vendor/bin/pint --test
      - run: ./vendor/bin/phpstan analyse --memory-limit=1G
      - run: npm run lint:check
      - run: npm run format:check
      - run: npm run types:check

      - run: php artisan migrate --force
      - run: ./vendor/bin/pest
